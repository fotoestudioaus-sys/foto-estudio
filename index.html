<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio Fotográfico — Portafolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600;1,6..72,500&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;600&family=Work+Sans:wght@400;500&family=Space+Mono:wght@400&family=Bitter:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- Fuentes: preset por defecto "Editorial Negativo" ---- */
    --f-display: 'Newsreader', serif;
    --f-body: 'Public Sans', sans-serif;
    --f-mono: 'IBM Plex Mono', monospace;

    /* ---- Paleta base: papel / tinta ---- */
    --paper: #EDEDE6;
    --paper-2: #E3E2D9;
    --ink: #16171A;
    --ink-soft: #4A4B47;

    /* ---- Acento: preset por defecto "Ámbar de cuarto oscuro" ---- */
    --accent: #E2A233;
    --accent-ink: #16171A;
    --accent-2: #3E6E64;

    --radius: 2px;
    --maxw: 1180px;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--f-body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%; display:block;}
  a{color:inherit;}
  button{font-family:inherit;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px;}
  .mono{font-family:var(--f-mono); letter-spacing:.02em;}
  .eyebrow{
    font-family:var(--f-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft);
  }
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important; transition-duration:.01ms !important;} }

  /* ---- tira de sprockets (firma visual: tira de negativo) ---- */
  .sprockets{
    height:14px;
    background-image: repeating-linear-gradient(90deg, var(--ink) 0 6px, transparent 6px 22px);
    background-position: center;
    background-repeat: repeat-x;
    background-size: 22px 6px;
    opacity:.85;
  }
  .sprockets.top{margin-bottom:0;}

  /* ---- header ---- */
  header.site{
    background:var(--paper);
    border-bottom:1px solid rgba(0,0,0,.1);
    position:sticky; top:0; z-index:40;
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 0;
  }
  .brand{
    font-family:var(--f-display); font-weight:600; font-size:22px; letter-spacing:.01em;
    text-decoration:none;
  }
  .brand .dot{color:var(--accent);}
  .navlinks{display:flex; gap:28px; align-items:center;}
  .navlinks a{
    font-family:var(--f-mono); font-size:12px; text-transform:uppercase; letter-spacing:.08em;
    text-decoration:none; color:var(--ink); border-bottom:1px solid transparent; padding-bottom:2px;
    cursor:pointer;
  }
  .navlinks a:hover{border-color:var(--accent);}
  .navlinks button.admin-link{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);font-family:var(--f-mono);
    font-size:11px; text-transform:uppercase; letter-spacing:.08em;
  }

  /* ---- hero ---- */
  .hero{
    position:relative;
    display:grid; grid-template-columns: 1.1fr .9fr; gap:0;
    min-height:560px;
    background:var(--ink);
    color:var(--paper);
    overflow:hidden;
  }
  .hero-copy{
    padding:80px 56px; display:flex; flex-direction:column; justify-content:center; gap:22px; z-index:2;
  }
  .hero-copy .eyebrow{color:var(--accent);}
  .hero-title{
    font-family:var(--f-display); font-style:italic; font-weight:500;
    font-size:clamp(38px, 5vw, 64px); line-height:1.04; margin:0; max-width:12ch;
  }
  .hero-sub{
    font-size:16px; color:#D9D8CE; max-width:42ch; margin:0;
  }
  .hero-cta{display:flex; gap:14px; margin-top:6px; flex-wrap:wrap;}
  .btn{
    font-family:var(--f-mono); font-size:12px; text-transform:uppercase; letter-spacing:.08em;
    padding:13px 22px; border:1px solid var(--paper); background:transparent; color:var(--paper);
    cursor:pointer; text-decoration:none; display:inline-block; border-radius:var(--radius);
    transition:background .15s, color .15s;
  }
  .btn:hover{background:var(--paper); color:var(--ink);}
  .btn.solid{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}
  .btn.solid:hover{filter:brightness(1.08); background:var(--accent); color:var(--accent-ink);}
  .hero-img{position:relative; overflow:hidden;}
  .hero-img img{width:100%; height:100%; object-fit:cover; min-height:400px; opacity:.92;}
  .hero-frame{
    position:absolute; top:20px; right:20px; font-family:var(--f-mono); font-size:11px;
    color:var(--paper); background:rgba(0,0,0,.45); padding:4px 8px; border:1px solid rgba(255,255,255,.4);
  }

  /* ---- secciones ---- */
  section{padding:88px 0;}
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between; gap:24px; margin-bottom:40px;
    flex-wrap:wrap;
  }
  .section-title{
    font-family:var(--f-display); font-size:34px; font-weight:600; margin:6px 0 0;
  }

  /* ---- filtros de categoría ---- */
  .filters{display:flex; gap:10px; flex-wrap:wrap;}
  .filter-btn{
    font-family:var(--f-mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    padding:8px 14px; border:1px solid var(--ink); background:transparent; cursor:pointer;
    border-radius:20px;
  }
  .filter-btn.active{background:var(--ink); color:var(--paper);}

  /* ---- hoja de contactos (grid de portafolio) ---- */
  .contact-sheet{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:2px;
    background:var(--ink);
    border:2px solid var(--ink);
  }
  .frame{
    position:relative; background:var(--ink); aspect-ratio:4/5; overflow:hidden; cursor:pointer;
  }
  .frame img{width:100%; height:100%; object-fit:cover; transition:transform .5s ease, opacity .3s;}
  .frame:hover img{transform:scale(1.045);}
  .frame-num{
    position:absolute; top:8px; left:8px; font-family:var(--f-mono); font-size:10px; color:#fff;
    background:rgba(0,0,0,.5); padding:2px 6px; letter-spacing:.05em;
  }
  .frame-cap{
    position:absolute; left:0; right:0; bottom:0; padding:8px 10px; font-family:var(--f-mono); font-size:10.5px;
    color:#fff; background:linear-gradient(0deg, rgba(0,0,0,.75), transparent); opacity:0; transition:opacity .2s;
  }
  .frame:hover .frame-cap{opacity:1;}
  .empty-state{
    grid-column:1/-1; padding:60px 20px; text-align:center; color:var(--ink-soft); font-family:var(--f-mono); font-size:13px;
  }
  @media (max-width:820px){ .contact-sheet{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:480px){ .contact-sheet{grid-template-columns:repeat(1,1fr);} }

  /* ---- lightbox ---- */
  .lightbox{
    position:fixed; inset:0; background:rgba(10,10,10,.94); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:40px;
  }
  .lightbox img{max-height:88vh; max-width:88vw; object-fit:contain;}
  .lightbox-close{
    position:absolute; top:24px; right:32px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer;
    font-family:var(--f-mono);
  }
  .lightbox-cap{position:absolute; bottom:26px; left:0; right:0; text-align:center; color:#ddd; font-family:var(--f-mono); font-size:12px;}

  /* ---- about ---- */
  .about{
    display:grid; grid-template-columns:.85fr 1.15fr; gap:64px; align-items:center;
  }
  .about img{aspect-ratio:4/5; object-fit:cover; width:100%;}
  .about-text p{font-size:16.5px; color:var(--ink-soft); max-width:56ch;}
  @media (max-width:760px){ .about{grid-template-columns:1fr;} }

  /* ---- contacto ---- */
  .contact-band{background:var(--ink); color:var(--paper);}
  .contact-band .section-title{color:var(--paper);}
  .contact-grid{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:30px;}
  .contact-info p{color:#D9D8CE; max-width:50ch;}
  .contact-links{display:flex; gap:18px; flex-wrap:wrap;}

  footer.site{padding:26px 0; font-family:var(--f-mono); font-size:11px; color:var(--ink-soft); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;}

  /* =====================================================
     ADMIN — panel "cuarto oscuro": tema oscuro, utilitario
     ===================================================== */
  .admin-shell{
    min-height:100vh; background:#0F1113; color:#E7E6DF; font-family:var(--f-body);
  }
  .admin-top{
    display:flex; align-items:center; justify-content:space-between; padding:16px 28px;
    border-bottom:1px solid #23262A; background:#0B0D0E; position:sticky; top:0; z-index:10;
  }
  .admin-top .brand{color:#E7E6DF; font-size:17px;}
  .admin-top .brand .dot{color:var(--accent);}
  .admin-actions{display:flex; gap:12px; align-items:center;}
  .admin-actions .btn{border-color:#3A3D41; color:#E7E6DF;}
  .admin-actions .btn:hover{background:#E7E6DF; color:#0F1113;}
  .admin-body{display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 60px);}
  .admin-nav{border-right:1px solid #23262A; padding:24px 0;}
  .admin-nav button{
    display:block; width:100%; text-align:left; padding:12px 26px; background:none; border:none; color:#9C9C93;
    font-family:var(--f-mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em; cursor:pointer;
    border-left:2px solid transparent;
  }
  .admin-nav button.active{color:#fff; border-left-color:var(--accent); background:#16181B;}
  .admin-main{padding:36px 40px; max-width:920px;}
  .admin-h{font-family:var(--f-mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:#9C9C93; margin-bottom:6px;}
  .admin-title{font-family:var(--f-display); font-size:26px; margin:0 0 28px; color:#fff;}
  .field{margin-bottom:20px;}
  .field label{display:block; font-family:var(--f-mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#9C9C93; margin-bottom:7px;}
  .field input[type=text], .field input[type=email], .field input[type=tel], .field input[type=url], .field input[type=password], .field textarea, .field select{
    width:100%; background:#16181B; border:1px solid #2B2E32; color:#E7E6DF; padding:11px 13px; border-radius:3px;
    font-family:var(--f-body); font-size:14px;
  }
  .field textarea{min-height:90px; resize:vertical;}
  .field input:focus, .field textarea:focus, .field select:focus{outline:2px solid var(--accent); border-color:var(--accent);}
  .row{display:grid; gap:16px;}
  .row.cols-2{grid-template-columns:1fr 1fr;}
  .row.cols-3{grid-template-columns:1fr 1fr 1fr;}
  @media (max-width:700px){ .row.cols-2, .row.cols-3{grid-template-columns:1fr;} }
  .card{background:#16181B; border:1px solid #23262A; padding:20px; border-radius:4px; margin-bottom:16px;}
  .btn-dark{
    font-family:var(--f-mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em;
    padding:11px 18px; background:var(--accent); color:#16171A; border:none; cursor:pointer; border-radius:3px;
  }
  .btn-dark:hover{filter:brightness(1.08);}
  .btn-ghost{
    font-family:var(--f-mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em;
    padding:10px 16px; background:transparent; color:#E7E6DF; border:1px solid #3A3D41; cursor:pointer; border-radius:3px;
  }
  .btn-ghost:hover{border-color:#E7E6DF;}
  .btn-danger{color:#E06B5A; border-color:#4a2c26;}
  .btn-danger:hover{background:#2a1512; border-color:#E06B5A;}
  .save-msg{font-family:var(--f-mono); font-size:12px; color:#7FBF8A; margin-left:14px;}
  .thumb-row{display:flex; gap:14px; align-items:center; padding:12px; border:1px solid #23262A; border-radius:4px; margin-bottom:10px; background:#121415;}
  .thumb-row img{width:64px; height:64px; object-fit:cover; border-radius:3px; flex-shrink:0;}
  .thumb-meta{flex:1; min-width:0;}
  .thumb-meta .cap{font-size:13px;}
  .thumb-meta .cat{font-family:var(--f-mono); font-size:10.5px; color:#9C9C93; text-transform:uppercase;}
  .thumb-actions{display:flex; gap:8px; flex-shrink:0;}
  .icon-btn{background:none; border:1px solid #3A3D41; color:#E7E6DF; width:30px; height:30px; border-radius:3px; cursor:pointer; font-size:13px;}
  .icon-btn:hover{border-color:#E7E6DF;}
  .icon-btn.danger{border-color:#4a2c26; color:#E06B5A;}
  .icon-btn.danger:hover{background:#2a1512;}
  .swatch-row{display:flex; gap:12px; flex-wrap:wrap;}
  .swatch{
    border:1px solid #2B2E32; border-radius:5px; padding:12px 14px; cursor:pointer; background:#16181B; min-width:150px;
  }
  .swatch.active{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .swatch .dots{display:flex; gap:6px; margin-bottom:8px;}
  .swatch .dots span{width:16px; height:16px; border-radius:50%; display:inline-block;}
  .swatch .name{font-family:var(--f-mono); font-size:11px; color:#E7E6DF;}
  .hint{font-family:var(--f-mono); font-size:11px; color:#7C7C74; line-height:1.6; margin-top:6px;}
  .gallery-link-box{
    display:flex; gap:8px; align-items:center; background:#0B0D0E; border:1px solid #2B2E32; padding:10px 12px; border-radius:3px;
  }
  .gallery-link-box input{background:none; border:none; color:#E7E6DF; font-family:var(--f-mono); font-size:12.5px; flex:1;}
  .status-pill{font-family:var(--f-mono); font-size:10px; text-transform:uppercase; padding:3px 8px; border-radius:10px; letter-spacing:.05em;}
  .status-pill.ok{background:#173323; color:#7FBF8A;}
  .status-pill.warn{background:#3a2f14; color:#E2A233;}
  .status-pill.expired{background:#3a1414; color:#E06B5A;}

  /* login */
  .login-shell{min-height:100vh; background:#0F1113; color:#E7E6DF; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{width:100%; max-width:380px; background:#16181B; border:1px solid #23262A; padding:36px 32px; border-radius:6px;}
  .login-card h1{font-family:var(--f-display); font-size:24px; margin:0 0 6px;}
  .login-card p.eyebrow{margin-bottom:20px;}
  .error-msg{color:#E06B5A; font-family:var(--f-mono); font-size:12px; margin-top:10px;}

  /* ---- página de galería de cliente ---- */
  .gallery-hero{
    background:var(--ink); color:var(--paper); padding:70px 0 46px; text-align:center;
  }
  .gallery-hero .eyebrow{color:var(--accent); justify-content:center; display:flex;}
  .gallery-hero h1{font-family:var(--f-display); font-style:italic; font-size:clamp(30px,4.5vw,46px); margin:10px 0;}
  .gallery-meta{font-family:var(--f-mono); font-size:12px; color:#B9B8AC;}
  .gallery-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; padding:50px 0;}
  @media (max-width:820px){ .gallery-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:480px){ .gallery-grid{grid-template-columns:1fr;} }
  .gallery-grid .frame{aspect-ratio:3/2; border-radius:3px;}
  .expired-box{
    max-width:520px; margin:100px auto; text-align:center; padding:0 20px;
  }
  .expired-box .eyebrow{justify-content:center; display:flex; color:#E06B5A;}
  .expired-box h1{font-family:var(--f-display); font-size:28px;}
  .loading-box{min-height:60vh; display:flex; align-items:center; justify-content:center; font-family:var(--f-mono); color:var(--ink-soft);}

  /* ---- editor de fotos / retoque (modal, estilo "cuarto oscuro") ---- */
  .editor-overlay{
    position:fixed; inset:0; background:rgba(6,7,8,.86); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .editor-panel{
    background:#0F1113; color:#E7E6DF; width:100%; max-width:960px; max-height:90vh; overflow-y:auto;
    border-radius:8px; border:1px solid #23262A; display:grid; grid-template-columns:1.1fr .9fr;
  }
  @media (max-width:760px){ .editor-panel{grid-template-columns:1fr;} }
  .editor-preview{
    background:#000; display:flex; align-items:center; justify-content:center; padding:20px; min-height:280px;
  }
  .editor-preview img{max-width:100%; max-height:60vh; object-fit:contain;}
  .editor-form{padding:26px 28px;}
  .editor-form h2{font-family:var(--f-display); font-size:20px; margin:0 0 18px; color:#fff;}
  .editor-close{
    position:absolute; top:18px; right:18px; background:none; border:none; color:#fff; font-size:22px; cursor:pointer;
  }
  .preset-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
  .preset-chip{
    font-family:var(--f-mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em;
    padding:8px 12px; border-radius:16px; border:1px solid #3A3D41; background:#16181B; color:#E7E6DF; cursor:pointer;
  }
  .preset-chip:hover{border-color:var(--accent);}
  .slider-row{margin-bottom:16px;}
  .slider-row label{display:flex; justify-content:space-between; font-family:var(--f-mono); font-size:11px; text-transform:uppercase; color:#9C9C93; margin-bottom:6px;}
  .slider-row input[type=range]{width:100%; accent-color:var(--accent);}

</style>
</head>
<body>
<div id="app" class="loading-box">Cargando estudio…</div>

<script>
/* =====================================================================
   ESTUDIO — prototipo de sitio fotográfico con panel admin y galerías
   temporales para clientes. Todo el contenido vive en una hoja de Google
   Sheets conectada vía Google Apps Script (ver configuración abajo).
   ===================================================================== */

/* =====================================================================
   CONFIGURACIÓN DE GUARDADO REAL (Google Sheets vía Apps Script)
   -----------------------------------------------------------------
   Pega aquí abajo, entre las comillas, la URL que te da Google Apps
   Script al publicar el backend (termina en /exec).
   Sigue la guía "guia-produccion.md" → sección "Backend con Google
   Sheets" para crear esa URL paso a paso.
   Mientras no la pegues, el sitio funciona en modo de solo lectura
   con los textos y fotos por defecto, y el panel de administrador
   te avisará que falta este paso.
   ===================================================================== */
const API_URL = 'PEGA_AQUI_TU_URL_DE_APPS_SCRIPT';

const STORAGE_AVAILABLE = !!API_URL && !API_URL.includes('PEGA_AQUI');

const STORAGE = {
  async get(key, shared=true){
    if(!STORAGE_AVAILABLE) return null;
    try{
      const res = await fetch(`${API_URL}?action=get&key=${encodeURIComponent(key)}`);
      const data = await res.json();
      return (data && data.value !== null && data.value !== undefined && data.value !== '') ? JSON.parse(data.value) : null;
    } catch(e){ console.error('Error leyendo', key, e); return null; }
  },
  async set(key, value, shared=true){
    if(!STORAGE_AVAILABLE) return null;
    try{
      await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ action:'set', key, value: JSON.stringify(value) })
      });
      return true;
    } catch(e){ console.error('Error guardando', key, e); return null; }
  },
  async delete(key, shared=true){
    if(!STORAGE_AVAILABLE) return null;
    try{
      await fetch(API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ action:'delete', key })
      });
      return true;
    } catch(e){ return null; }
  }
};

const FONT_PRESETS = {
  editorial: { name:'Editorial Negativo', display:"'Newsreader', serif", body:"'Public Sans', sans-serif", mono:"'IBM Plex Mono', monospace" },
  contacto:  { name:'Contacto Clásico',   display:"'Bitter', serif",     body:"'Work Sans', sans-serif",   mono:"'IBM Plex Mono', monospace" },
  tecnico:   { name:'Técnico',            display:"'Space Grotesk', sans-serif", body:"'Work Sans', sans-serif", mono:"'Space Mono', monospace" }
};
const COLOR_PRESETS = {
  ambar: { name:'Ámbar de cuarto oscuro', accent:'#E2A233', accent2:'#3E6E64' },
  rojo:  { name:'Rojo luz de seguridad',  accent:'#C8432E', accent2:'#2C4A52' },
  cian:  { name:'Cian de negativo',       accent:'#2E8B8B', accent2:'#B5482E' }
};

/* ---- Retoque de fotos: ajustes y sugerencias de estilo (aplicados con filtro CSS, no destructivo) ---- */
const DEFAULT_ADJUST = { brightness:100, contrast:100, saturate:100, sepia:0, grayscale:0 };
const FILTER_PRESETS = {
  original:     { name:'Original',           adjust:{ brightness:100, contrast:100, saturate:100, sepia:0,  grayscale:0 } },
  bn:           { name:'Blanco y negro',     adjust:{ brightness:100, contrast:106, saturate:100, sepia:0,  grayscale:100 } },
  bn_dramatico: { name:'B/N dramático',      adjust:{ brightness:94,  contrast:132, saturate:100, sepia:0,  grayscale:100 } },
  sepia:        { name:'Sepia clásico',      adjust:{ brightness:105, contrast:105, saturate:100, sepia:70, grayscale:0 } },
  calido:       { name:'Retrato cálido',     adjust:{ brightness:105, contrast:102, saturate:116, sepia:18, grayscale:0 } },
  luminosa:     { name:'Boda luminosa',      adjust:{ brightness:112, contrast:97,  saturate:106, sepia:0,  grayscale:0 } },
  limpio:       { name:'Producto limpio',    adjust:{ brightness:103, contrast:113, saturate:90,  sepia:0,  grayscale:0 } }

  return `brightness(${a.brightness}%) contrast(${a.contrast}%) saturate(${a.saturate}%) sepia(${a.sepia}%) grayscale(${a.grayscale}%)`;
}

/* ---------------------------- SESIÓN DE ADMIN (persistente) ---------------------------- */
const SESSION_KEY = 'estudiofoto_admin_session';
const SESSION_DAYS = 7;
function saveAdminSession(){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify({ ok:true, expires: Date.now() + SESSION_DAYS*24*60*60*1000 })); }
  catch(e){ /* si el navegador bloquea localStorage, simplemente no persiste entre recargas */ }
}
function hasValidAdminSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    return !!s.ok && s.expires > Date.now();
  } catch(e){ return false; }
}
function clearAdminSession(){
  try{ localStorage.removeItem(SESSION_KEY); } catch(e){}
}

function applyDesign(design){
  const f = FONT_PRESETS[design.font] || FONT_PRESETS.editorial;
  const c = COLOR_PRESETS[design.color] || COLOR_PRESETS.ambar;
  const root = document.documentElement.style;
  root.setProperty('--f-display', f.display);
  root.setProperty('--f-body', f.body);
  root.setProperty('--f-mono', f.mono);
  root.setProperty('--accent', c.accent);
  root.setProperty('--accent-2', c.accent2);
}

function fileIdFromDriveUrl(url){
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m1) return m1[1];
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return m2[1];
  return null;
}
function normalizeImageUrl(url){
  if(!url) return url;
  if(url.includes('drive.google.com')){
    const id = fileIdFromDriveUrl(url);
    if(id) return `https://drive.google.com/uc?export=view&id=${id}`;
  }
  return url;
}

function addMonths(date, months){
  const d = new Date(date);
  d.setMonth(d.getMonth() + months);
  return d;
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('es-MX', { year:'numeric', month:'short', day:'numeric' });
}
function uid(){ return Math.random().toString(36).slice(2,9); }

async function loadInitial(){
  const params = new URLSearchParams(window.location.search);
  const g = params.get('g');
  const adminParam = params.has('admin');

  let [content, design, portfolio] = await Promise.all([
    STORAGE.get('site:content'), STORAGE.get('site:design'), STORAGE.get('site:portfolio')
  ]);
  if(!content){ content = DEFAULT_CONTENT; await STORAGE.set('site:content', content); }
  else if(!content.calendlyLink){ content = {...DEFAULT_CONTENT, ...content, calendlyLink: DEFAULT_CONTENT.calendlyLink}; await STORAGE.set('site:content', content); }
  if(!design){ design = DEFAULT_DESIGN; await STORAGE.set('site:design', design); }
  if(!portfolio){ portfolio = DEFAULT_PORTFOLIO; await STORAGE.set('site:portfolio', portfolio); }

  let pass = await STORAGE.get('site:admin-pass');
  if(!pass){ pass = { value: DEFAULT_PASSWORD }; await STORAGE.set('site:admin-pass', pass); }

  state.content = content; state.design = design; state.portfolio = portfolio;
  applyDesign(design);

  if(g){
    state.view = 'gallery'; state.galleryId = g;
    state.galleryData = await STORAGE.get('gallery:' + g);
    render();
  } else if(adminParam){
    if(hasValidAdminSession()){
      state.isAdmin = true; state.view = 'admin';
    } else {
      state.view = 'admin-login';
    }
    render();
  } else {
    state.view = 'public';
    render();
  }
}

function render(){
  const app = document.getElementById('app');
  app.className = '';
  if(state.view === 'public') app.innerHTML = renderPublic();
  else if(state.view === 'gallery') app.innerHTML = renderGallery();
  else if(state.view === 'admin-login') app.innerHTML = renderLogin();
  else if(state.view === 'admin') app.innerHTML = renderAdmin();
  bindEvents();
}

  <div class="card">
    <div class="field"><label>Nueva contraseña de administrador</label>
      <input type="password" id="f-newpass" placeholder="Escribe una contraseña nueva"></div>
    <button class="btn-dark" data-action="change-pass">Actualizar contraseña</button>
  </div>
  <div class="card">
    <div class="admin-h">Guardar y respaldar en Google Drive</div>
    <p class="hint" style="margin-bottom:12px;">Este prototipo guarda todo en el almacenamiento del sitio. Para respaldo real de las fotos en Google Drive, sigue la guía de producción que te compartí aparte — ahí está el paso a paso para conectar tu cuenta.</p>
  </div>
  `;
}

/* ---------------------------- EDITOR DE FOTOS / RETOQUE ---------------------------- */
function renderPhotoEditor(){
  const ep = state.editingPhoto;
  const p = ep.draft;
  const a = p.adjust;
  return `
  <div class="editor-overlay" data-action="close-editor">
    <div class="editor-panel" onclick="event.stopPropagation()">
      <div class="editor-preview">
        <img id="editor-preview-img" src="${p.url}" alt="" style="filter:${cssFilterFor(p)}">
      </div>
      <div class="editor-form">
        <button class="editor-close" data-action="close-editor">✕</button>
        <h2>Editar foto</h2>

        <div class="field"><label>URL de la imagen</label>
          <input type="url" id="ep-url" value="${escapeHtml(p.url)}" oninput="window.__editorUpdateUrl(this.value)"></div>
        ${ep.scope==='portfolio' ? `
        <div class="field"><label>Categoría</label>
          <input type="text" id="ep-category" value="${escapeHtml(p.category||'')}"></div>` : ''}
        <div class="field"><label>Descripción</label>
          <input type="text" id="ep-caption" value="${escapeHtml(p.caption||'')}"></div>

        <div class="admin-h" style="margin:22px 0 10px;">Sugerencias de retoque</div>
        <div class="preset-row">
          ${Object.entries(FILTER_PRESETS).map(([key,fp])=>`<button type="button" class="preset-chip" onclick="window.__editorApplyPreset('${key}')">${fp.name}</button>`).join('')}
        </div>

        <div class="admin-h" style="margin:18px 0 10px;">Ajuste fino</div>
        <div class="slider-row">
          <label>Brillo <span id="ep-val-brightness">${a.brightness}%</span></label>
          <input type="range" min="50" max="150" value="${a.brightness}" oninput="window.__editorSlide('brightness', this.value)">
        </div>
        <div class="slider-row">
          <label>Contraste <span id="ep-val-contrast">${a.contrast}%</span></label>
          <input type="range" min="50" max="150" value="${a.contrast}" oninput="window.__editorSlide('contrast', this.value)">
        </div>
        <div class="slider-row">
          <label>Saturación <span id="ep-val-saturate">${a.saturate}%</span></label>
          <input type="range" min="0" max="200" value="${a.saturate}" oninput="window.__editorSlide('saturate', this.value)">
        </div>
        <div class="slider-row">
          <label>Sepia <span id="ep-val-sepia">${a.sepia}%</span></label>
          <input type="range" min="0" max="100" value="${a.sepia}" oninput="window.__editorSlide('sepia', this.value)">
        </div>
        <div class="slider-row">
          <label>Blanco y negro <span id="ep-val-grayscale">${a.grayscale}%</span></label>
          <input type="range" min="0" max="100" value="${a.grayscale}" oninput="window.__editorSlide('grayscale', this.value)">
        </div>

        <div style="display:flex; gap:10px; margin-top:22px;">
          <button class="btn-dark" onclick="window.__editorSave()">Guardar cambios</button>
          <button class="btn-ghost" data-action="close-editor">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
}

function findPhotoForEdit(scope, id, galleryId){
  if(scope==='portfolio') return state.portfolio.find(p=>p.id===id);
  const g = (state.galleries||[]).find(g=>g.id===galleryId);
  return g ? g.photos.find(p=>p.id===id) : null;
}

function openPhotoEditor(scope, id, galleryId){
  const original = findPhotoForEdit(scope, id, galleryId);
  if(!original) return;
  state.editingPhoto = {
    scope, galleryId,
    draft: { ...original, adjust: { ...(original.adjust || DEFAULT_ADJUST) } }
  };
  render();
}

window.__editorUpdateUrl = function(val){
  if(!state.editingPhoto) return;
  state.editingPhoto.draft.url = val;
  const img = document.getElementById('editor-preview-img');
  if(img) img.src = val;
};

window.__editorSlide = function(field, val){
  if(!state.editingPhoto) return;
  const num = parseInt(val,10);
  state.editingPhoto.draft.adjust[field] = num;
  const img = document.getElementById('editor-preview-img');
  if(img) img.style.filter = cssFilterFor(state.editingPhoto.draft);
  const label = document.getElementById('ep-val-'+field);
  if(label) label.textContent = num + '%';
};

window.__editorApplyPreset = function(key){
  if(!state.editingPhoto) return;
  const preset = FILTER_PRESETS[key];
  if(!preset) return;
  state.editingPhoto.draft.adjust = { ...preset.adjust };
  render();
};

window.__editorSave = async function(){
  const ep = state.editingPhoto;
  if(!ep) return;
  const url = document.getElementById('ep-url').value.trim();
  const caption = document.getElementById('ep-caption').value.trim();
  const categoryEl = document.getElementById('ep-category');
  const category = categoryEl ? categoryEl.value.trim() : undefined;

  const updated = { ...ep.draft, url: normalizeImageUrl(url) || url, caption };
  if(category !== undefined) updated.category = category || 'General';

  if(ep.scope === 'portfolio'){
    state.portfolio = state.portfolio.map(p => p.id === updated.id ? updated : p);
    state.editingPhoto = null;
    render(); // optimista: se ve al instante
    STORAGE.set('site:portfolio', state.portfolio); // se guarda en segundo plano
  } else {
    const g = (state.galleries||[]).find(g=>g.id===ep.galleryId);
    if(g){
      g.photos = g.photos.map(p => p.id === updated.id ? updated : p);
    }
    state.editingPhoto = null;
    render();
    if(g) STORAGE.set('gallery:'+g.id, g);
  }
};

/* ---------------------------- HELPERS ---------------------------- */
function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function nl2br(str){ return escapeHtml(str).replace(/\n/g,'<br>'); }

/* ---------------------------- EVENTS ---------------------------- */
function bindActionListeners(root){
  root.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });
}
function bindEvents(){
  const app = document.getElementById('app');
  bindActionListeners(app);
  if(state.view==='admin' && state.adminTab==='galerias'){
    ensureGalleriesLoaded();
  }
}

async function onAction(e){
  const action = e.currentTarget.dataset.action;
  const d = e.currentTarget.dataset;

  if(action==='go-admin'){
    history.pushState({}, '', '?admin');
    if(hasValidAdminSession()){ state.isAdmin = true; state.view = 'admin'; }
    else { state.view = 'admin-login'; }
    render();
  }
  if(action==='go-public'){ history.pushState({}, '', location.pathname); state.view='public'; render(); }
  if(action==='logout'){ state.isAdmin=false; clearAdminSession(); history.pushState({}, '', location.pathname); state.view='public'; render(); }

  if(action==='filter'){ state.activeFilter = d.cat; render(); }
  if(action==='open-lightbox'){ state.lightbox = parseInt(d.idx,10); render(); }
  if(action==='open-gallery-lightbox'){ state.lightbox = parseInt(d.idx,10); render(); }
  if(action==='close-lightbox' && e.target===e.currentTarget){ state.lightbox = null; render(); }

  if(action==='edit-photo'){ openPhotoEditor(d.scope, d.id, d.galleryId); }
  if(action==='close-editor' && e.target===e.currentTarget){ state.editingPhoto = null; render(); }

  if(action==='try-login'){
    const val = document.getElementById('admin-pass-input').value;
    if(!STORAGE_AVAILABLE){
      if(val === DEFAULT_PASSWORD){
        state.isAdmin = true; state.view = 'admin'; state.saveMsg = ''; saveAdminSession(); render();
        setTimeout(()=>alert('Modo sin guardado: todavía no conectaste el backend de Google Sheets, así que los cambios que hagas aquí no se guardarán. Sigue la guía "Backend con Google Sheets" para activarlo.'), 200);
      } else {
        document.getElementById('login-error').innerHTML = '<div class="error-msg">Contraseña incorrecta. (Todavía no conectaste el backend de guardado, así que solo se acepta la contraseña por defecto: admin123)</div>';
      }
      return;
    }
    const saved = await STORAGE.get('site:admin-pass');
    if(saved && val === saved.value){
      state.isAdmin = true; state.view = 'admin'; saveAdminSession(); render();
    } else {
      document.getElementById('login-error').innerHTML = '<div class="error-msg">Contraseña incorrecta.</div>';
    }
  }

  if(action==='tab'){ state.adminTab = d.tab; render(); }

  if(action==='save-contenido'){
    const c = {
      heroTitle: document.getElementById('f-heroTitle').value,
      heroSubtitle: document.getElementById('f-heroSubtitle').value,
      heroImage: document.getElementById('f-heroImage').value,
      aboutTitle: document.getElementById('f-aboutTitle').value,
      aboutText: document.getElementById('f-aboutText').value,
      aboutImage: document.getElementById('f-aboutImage').value,
      contactEmail: document.getElementById('f-contactEmail').value,
      instagram: document.getElementById('f-instagram').value,
      calendlyLink: document.getElementById('f-calendlyLink').value
    };
    state.content = c;
    flashSave(); // se ve "Guardado" al instante
    STORAGE.set('site:content', c); // se guarda en segundo plano, sin bloquear la interfaz
  }

  if(action==='set-font'){
    state.design = {...state.design, font:d.key}; applyDesign(state.design); render();
    STORAGE.set('site:design', state.design);
  }
  if(action==='set-color'){
    state.design = {...state.design, color:d.key}; applyDesign(state.design); render();
    STORAGE.set('site:design', state.design);
  }

  if(action==='add-photo'){
    const url = document.getElementById('np-url').value.trim();
    const category = document.getElementById('np-category').value.trim() || 'General';
    const caption = document.getElementById('np-caption').value.trim();
    const fileInput = document.getElementById('np-file');

    let finalUrl = url ? normalizeImageUrl(url) : null;
    if(!finalUrl && fileInput.files[0]){
      finalUrl = await fileToCompressedDataUrl(fileInput.files[0]); // esto sí necesita esperar (leer el archivo)
    }
    if(!finalUrl){ alert('Agrega una URL o selecciona un archivo.'); return; }

    const newPhoto = { id: uid(), url: finalUrl, category, caption, adjust: {...DEFAULT_ADJUST} };
    state.portfolio = [...state.portfolio, newPhoto];
    render(); // se ve al instante en la lista
    STORAGE.set('site:portfolio', state.portfolio); // se guarda en segundo plano
  }

  if(action==='delete-photo'){
    state.portfolio = state.portfolio.filter(p=>p.id!==d.id);
    render();
    STORAGE.set('site:portfolio', state.portfolio);
  }

  if(action==='create-gallery'){
    const name = document.getElementById('ng-name').value.trim();
    const months = parseInt(document.getElementById('ng-duration').value,10);
    if(!name){ alert('Ponle un nombre a la galería.'); return; }
    const id = uid();
    const now = new Date();
    const gallery = {
      id, name,
      createdAt: now.toISOString(),
      expiresAt: addMonths(now, months).toISOString(),
      durationMonths: months,
      photos: []
    };
    state.galleries = [...(state.galleries||[]), gallery]; // caché local: no hace falta re-descargar todo
    document.getElementById('ng-name').value = '';
    renderGalleriesList(); // se ve al instante
    (async ()=>{
      await STORAGE.set('gallery:' + id, gallery);
      const idx = (await STORAGE.get('galleries:index')) || [];
      idx.push(id);
      await STORAGE.set('galleries:index', idx);
    })();
  }


  if(action==='change-pass'){
    const val = document.getElementById('f-newpass').value;
    if(!val || val.length<4){ alert('Usa al menos 4 caracteres.'); return; }
    await STORAGE.set('site:admin-pass', { value: val });
    document.getElementById('f-newpass').value='';
    flashSave();
  }
}

function flashSave(){
  state.saveMsg = 'Guardado ✓';
  render();
  setTimeout(()=>{ state.saveMsg=''; const el=document.querySelector('.save-msg'); if(el) el.textContent=''; }, 2000);
}

async function fileToCompressedDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 1400;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------------------------- GALERÍAS: lista en admin (con caché local) ---------------------------- */
async function ensureGalleriesLoaded(){
  if(state.galleries !== null){ renderGalleriesList(); return; } // ya está en caché: solo se vuelve a pintar, sin red
  const container = document.getElementById('galleries-list');
  if(container) container.innerHTML = 'Cargando…';
  const idx = (await STORAGE.get('galleries:index')) || [];
  if(!idx.length){ state.galleries = []; renderGalleriesList(); return; }
  const galleries = await Promise.all(idx.map(id=>STORAGE.get('gallery:'+id)));
  state.galleries = galleries.filter(Boolean);
  let neededBackfill = false;
  state.galleries.forEach(g=>{
    g.photos.forEach(p=>{
      if(!p.id){ p.id = uid(); neededBackfill = true; }
      if(!p.adjust){ p.adjust = {...DEFAULT_ADJUST}; neededBackfill = true; }
    });
  });
  if(neededBackfill){
    state.galleries.forEach(g=> STORAGE.set('gallery:'+g.id, g)); // guarda en segundo plano, sin bloquear
  }
  renderGalleriesList();
}

function renderGalleriesList(){
  const container = document.getElementById('galleries-list');
  if(!container) return;
  const list = state.galleries || [];
  if(!list.length){ container.innerHTML = '<p class="hint">Aún no has creado ninguna galería.</p>'; return; }

  container.innerHTML = list.map(g=>{
    const expired = new Date(g.expiresAt) < new Date();
    const daysLeft = Math.ceil((new Date(g.expiresAt)-new Date())/86400000);
    const status = expired ? '<span class="status-pill expired">Expirada</span>' : (daysLeft<14 ? '<span class="status-pill warn">Vence pronto</span>' : '<span class="status-pill ok">Activa</span>');
    const link = `${location.origin}${location.pathname}?g=${g.id}`;
    return `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
        <div><strong>${escapeHtml(g.name)}</strong> ${status}</div>
        <div class="hint" style="margin:0;">Creada ${fmtDate(g.createdAt)} · vence ${fmtDate(g.expiresAt)}</div>
      </div>
      <div class="gallery-link-box" style="margin-bottom:14px;">
        <input type="text" readonly value="${link}" onclick="this.select()">
        <button class="icon-btn" onclick="navigator.clipboard.writeText('${link}'); this.textContent='✓';">⧉</button>
      </div>

      ${g.photos.length ? `
      <div style="margin-bottom:14px;">
        ${g.photos.map(p=>`
          <div class="thumb-row">
            <img src="${p.url}" alt="" style="filter:${cssFilterFor(p)}">
            <div class="thumb-meta">
              <div class="cap">${escapeHtml(p.caption||'(sin descripción)')}</div>
            </div>
            <div class="thumb-actions">
              <button class="icon-btn" data-action="edit-photo" data-scope="gallery" data-gallery-id="${g.id}" data-id="${p.id}" title="Editar y retocar">✎</button>
              <button class="icon-btn danger" onclick="window.__deleteGalleryPhoto('${g.id}','${p.id}')" title="Eliminar">✕</button>
            </div>
          </div>
        `).join('')}
      </div>` : '<p class="hint" style="margin-bottom:14px;">Esta galería todavía no tiene fotos.</p>'}

      <div class="field"><label>Agregar foto a esta galería (URL o Drive)</label>
        <div class="row cols-2">
          <input type="url" placeholder="https://... o enlace de Drive" id="gp-url-${g.id}">
          <input type="text" placeholder="Descripción (opcional)" id="gp-cap-${g.id}">
        </div>
        <button class="btn-ghost" style="margin-top:8px;" onclick="window.__addGalleryPhoto('${g.id}')">Añadir foto</button>
      </div>
      <div style="display:flex; gap:10px; margin-top:14px;">
        <button class="btn-ghost" onclick="window.__extendGallery('${g.id}')">Extender 3 meses</button>
        <button class="btn-ghost btn-danger" onclick="window.__deleteGallery('${g.id}')">Eliminar galería</button>
      </div>
    </div>`;
  }).join('');
  bindActionListeners(container); // vuelve a enlazar los botones "editar" que se acaban de dibujar
}

window.__addGalleryPhoto = function(id){
  const urlInput = document.getElementById('gp-url-'+id);
  const capInput = document.getElementById('gp-cap-'+id);
  const url = normalizeImageUrl(urlInput.value.trim());
  if(!url) { alert('Pega una URL de imagen.'); return; }
  const g = state.galleries.find(g=>g.id===id);
  if(!g) return;
  g.photos.push({ id: uid(), url, caption: capInput.value.trim(), adjust: {...DEFAULT_ADJUST} });
  renderGalleriesList(); // al instante
  STORAGE.set('gallery:'+id, g); // en segundo plano
};
window.__deleteGalleryPhoto = function(galleryId, photoId){
  const g = state.galleries.find(g=>g.id===galleryId);
  if(!g) return;
  g.photos = g.photos.filter(p=>p.id!==photoId);
  renderGalleriesList();
  STORAGE.set('gallery:'+galleryId, g);
};
window.__extendGallery = function(id){
  const g = state.galleries.find(g=>g.id===id);
  if(!g) return;
  g.expiresAt = addMonths(new Date(g.expiresAt), 3).toISOString();
  renderGalleriesList();
  STORAGE.set('gallery:'+id, g);
};
window.__deleteGallery = function(id){
  if(!confirm('¿Eliminar esta galería? Esta acción no se puede deshacer.')) return;
  state.galleries = state.galleries.filter(g=>g.id!==id);
  renderGalleriesList();
  (async ()=>{
    await STORAGE.delete('gallery:'+id);
    const idx = (await STORAGE.get('galleries:index')) || [];
    await STORAGE.set('galleries:index', idx.filter(x=>x!==id));
  })();
};

loadInitial();
</script>
